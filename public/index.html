<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서비스 안내</title>
    <style>
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: #ffd700;
        }
        p {
            color: #9ca3af;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>점검 중</h1>
        <p>현재 서비스 리뉴얼 준비 중입니다. 잠시 후 다시 찾아뵙겠습니다.</p>
    </div>
</body>
</html>
